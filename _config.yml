# The Site Configuration

theme: jekyll-theme-chirpy

lang: en

timezone: Asia/Kolkata

# SEO Settings
title: RU22-S Labs

tagline: Cybersecurity, Geopolitics & Strategic Technology

description: >-
  Research, writeups, OSINT, geopolitics,
  cybersecurity, and strategic technology analysis.

url: "https://ru22-s.in"

baseurl: ""

github:
  username: Ru22-s

social:
  name: Rudra Harsh Vardhan Singh
  email: rudraharsh34@gmail.com
  links:
    - https://github.com/Ru22-s
    - https://www.linkedin.com/in/
    - https://tryhackme.com/p/Rud5674

# Dark mode by default
theme_mode: dark

# Sidebar avatar
avatar: /assets/img/pfp.png

# Social preview image
social_preview_image: /assets/img/preview.png

# TOC
toc: true

# Comments disabled for now
comments:
  provider:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

# Markdown
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
